<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>function in js</title>
</head>
<body>
    <script>
        //nomral function without para

        function demo(){
            console.log("hello JS");
        }
        demo();

              //nomral function with para

        function demo1(text){
            console.log("hello " + text);
        }
        demo1("react");
        
        //function asynchronus 
              //nomral function without para

        function demo2(){
            console.log("hello JS");
        }
        

              //nomral function with para

        function demo3(text){
            console.log("hello " + text);
        }
        demo3("react");
        demo2();

        //functtion with default parameters
        function add(a,b=10){
            console.log("addition of two numbers is"+ (a+b));
        }
        add(3);
    </script>
</body>
</html>
