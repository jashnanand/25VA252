<!DOCTYPE html>
<html>
<head>
    <title>Style Changer</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            background-color: white;
            transition: 0.5s;
        }

        h1 {
            margin-top: 100px;
            transition: 0.5s;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
           
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn1 { background-color: lightblue; }
        .btn2 { background-color: lightgreen; }
        .btn3 { background-color: lightcoral; }
    </style>
</head>

<body id="myBody">

    <h1 id="text">Click Buttons to Change Style</h1>

    <button class="btn1" onclick="blueTheme()">Blue Theme</button>
    <button class="btn2" onclick="greenTheme()">Green Theme</button>
    <button class="btn3" onclick="darkTheme()">Dark Theme</button>

    <script>
        function blueTheme() {
            document.getElementById("myBody").style.backgroundColor = "lightblue";
            document.getElementById("text").style.color = "darkblue";
          
        }

        function greenTheme() {
            document.getElementById("myBody").style.backgroundColor = "lightgreen";
            document.getElementById("text").style.color = "darkgreen";
           
        }

        function darkTheme() {
            document.getElementById("myBody").style.backgroundColor = "black";
            document.getElementById("text").style.color = "white";
       
        }
    </script>

</body>
</html>
