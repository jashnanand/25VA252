<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //var are container in js
        var myName="ABES";
        document.write(myName);
        console.log(myName);
        // JS Execution and Scope(Global and Local)

        function demo(){
            var msg="thanks" //local
            console.log(msg);
        }

        demo();
        let msg2="thanks again";
        console.log(msg2);

        const msg3="thanks to visit my page";
        console.log(msg3);
    </script>
</body>
</html>
